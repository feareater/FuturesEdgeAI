<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FuturesEdge AI</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <!-- PWA manifest + theme -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d0f1a" />
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FuturesEdge" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <!-- TradingView Lightweight Charts v4 — loaded before our scripts -->
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="app">

    <header id="topbar">
      <div id="brand">FuturesEdge AI</div>
      <span id="data-age" class="data-age">—</span>

      <div id="controls">
        <div class="control-group">
          <span class="control-label">Symbol</span>
          <div class="btn-group">
            <button class="sym-btn active" data-symbol="MNQ">MNQ</button>
            <button class="sym-btn"        data-symbol="MGC">MGC</button>
            <button class="sym-btn"        data-symbol="MES">MES</button>
            <button class="sym-btn"        data-symbol="MCL">MCL</button>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Timeframe</span>
          <div class="btn-group">
            <button class="tf-btn"        data-tf="1m">1m</button>
            <button class="tf-btn"        data-tf="2m">2m</button>
            <button class="tf-btn"        data-tf="3m">3m</button>
            <button class="tf-btn active" data-tf="5m">5m</button>
            <button class="tf-btn"        data-tf="15m">15m</button>
            <button class="tf-btn"        data-tf="30m">30m</button>
          </div>
        </div>
      </div>

      <div id="ohlc-display">
        <span class="ohlc-label">O</span><span id="ohlc-o">—</span>
        <span class="ohlc-label">H</span><span id="ohlc-h">—</span>
        <span class="ohlc-label">L</span><span id="ohlc-l">—</span>
        <span class="ohlc-label">C</span><span id="ohlc-c">—</span>
      </div>

      <div id="last-price">
        <span id="price-value">—</span>
        <span id="price-symbol">MNQ · 5m</span>
      </div>

      <!-- Relative Strength widget (MNQ vs MES, only shown for equity symbols) -->
      <div id="rs-widget" class="rs-widget" style="display:none">
        <span class="rs-label">RS</span>
        <span id="rs-ratio" class="rs-ratio">—</span>
        <span id="rs-signal" class="rs-signal">—</span>
      </div>

      <a href="/docs.html" id="docs-nav-link" title="Setup Guide">Guide</a>
      <a href="/commentary.html" id="ai-nav-link" title="AI Analysis">AI</a>
      <a href="/performance.html" id="perf-nav-link" title="Performance Analytics">Stats</a>
      <a href="/backtest.html" id="bt-nav-link" title="Alert Replay">Replay</a>
      <a href="/api/export" id="export-nav-link" title="Export all alerts &amp; trades as JSON" download>Export</a>
      <div id="topbar-status">
        <span id="calendar-badge" class="calendar-badge" style="display:none"></span>
        <span id="session-badge" class="session-badge">—</span>
        <span id="ws-status" class="ws-status ws-connecting" title="WebSocket status"></span>
      </div>
    </header>

    <main id="main">

      <aside id="left-panel">

        <!-- ── Alert feed ──────────────────────────────────────────────── -->
        <div class="panel-section" id="alert-section">

          <div class="panel-header">
            Alert Feed
            <span id="alert-stats" class="alert-stats-badge">—</span>
            <button id="log-trade-btn" class="log-trade-btn" title="Log a manual trade not tied to a detected setup">＋ Trade</button>
            <a href="/docs.html" class="guide-btn" title="Setup Guide — learn what each alert means" target="_blank">? Guide</a>
          </div>
          <!-- Manual trade entry form (hidden until button click) -->
          <div id="manual-trade-form" style="display:none"></div>

          <!-- Win-rate stats row -->
          <div id="wr-bar">
            <span id="wr-won"  class="wr-won">W 0</span>
            <span id="wr-lost" class="wr-lost">L 0</span>
            <span id="wr-open" class="wr-open">O 0</span>
            <span id="wr-pct"  class="wr-pct">— WR</span>
          </div>

          <!-- ── AutoTrader kill switch ─────────────────────────────────── -->
          <div id="autotrader-panel">
            <div class="at-row">
              <span class="at-label">AutoTrader</span>
              <span id="at-status-dot" class="at-dot at-paused"></span>
              <button id="at-toggle-btn" class="at-toggle-btn at-paused">PAUSED</button>
              <span class="at-platform">Paper Sim</span>
            </div>
            <div id="at-position-row" class="at-position-row">—</div>
            <div id="at-summary-row" class="at-summary-row"></div>
            <div class="at-row at-conf-row">
              <label class="at-conf-label" for="at-min-conf">Min Conf</label>
              <input id="at-min-conf" type="number" class="filter-input narrow" value="75" min="65" max="99" step="5" />
              <span class="filter-unit">%</span>
              <span id="at-last-order" class="at-last-order"></span>
            </div>
          </div>

          <!-- Filter controls -->
          <div id="alert-filters">
            <div class="filter-row">
              <label class="filter-label" for="min-conf">Min Conf</label>
              <input id="min-conf" type="number" class="filter-input" value="65" min="0" max="99" step="5" />
              <span class="filter-unit">%</span>
            </div>
            <div class="filter-row">
              <label class="filter-label">Contracts</label>
              <span class="filter-sym">MNQ</span>
              <input id="mnq-contracts" type="number" class="filter-input narrow" value="5" min="1" max="20" />
              <span class="filter-sym">MGC</span>
              <input id="mgc-contracts" type="number" class="filter-input narrow" value="3" min="1" max="20" />
            </div>
            <div class="filter-row">
              <label class="filter-label" for="max-risk">Max Risk</label>
              <span class="filter-unit">$</span>
              <input id="max-risk" type="number" class="filter-input" value="200" min="50" max="2000" step="50" />
            </div>
            <div class="filter-row">
              <label class="filter-label" for="rr-ratio">R:R Ratio</label>
              <input id="rr-ratio" type="number" class="filter-input narrow" value="2.0" min="1.5" max="5" step="0.5" />
              <span class="filter-unit">:1</span>
              <span id="rr-status" class="filter-unit rr-status"></span>
            </div>
            <div class="filter-row">
              <label class="filter-label">Refresh</label>
              <select id="refresh-interval" class="filter-select">
                <option value="1">1 min</option>
                <option value="5">5 min</option>
                <option value="10">10 min</option>
                <option value="15" selected>15 min</option>
                <option value="30">30 min</option>
              </select>
              <button id="refresh-now-btn" class="refresh-now-btn" title="Fetch fresh data now">↻ Now</button>
            </div>
          </div>

          <div id="alert-feed">
            <p class="placeholder">Scanning…</p>
          </div>
        </div>

      </aside>

      <div id="chart-wrap">
        <div id="chart-container"></div>
      </div>

      <aside id="right-panel">

        <!-- ── Correlation Heatmap ─────────────────────────────────────── -->
        <div class="panel-section" id="corr-heatmap-section">
          <div class="panel-header">Correlation <span id="corr-updated" class="corr-updated"></span></div>
          <div id="corr-grid" class="corr-grid">
            <div class="corr-loading">—</div>
          </div>
        </div>

        <!-- ── Layer toggles ───────────────────────────────────────────── -->
        <div class="panel-section" id="layers-section">
          <div class="panel-header">Layers</div>
          <div id="layer-list">

            <label class="layer-row">
              <input type="checkbox" data-layer="ema9" checked />
              <span class="swatch" style="background:#2962ff"></span>
              <span class="layer-name">EMA 9</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="ema21" checked />
              <span class="swatch" style="background:#ff6d00"></span>
              <span class="layer-name">EMA 21</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="ema50" checked />
              <span class="swatch" style="background:#d500f9"></span>
              <span class="layer-name">EMA 50</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="vwap" checked />
              <span class="swatch" style="background:#00bcd4; border-style:dashed"></span>
              <span class="layer-name">VWAP</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="priorDayHighLow" checked />
              <span class="swatch" style="background:#607d8b; border-style:dashed"></span>
              <span class="layer-name">PDH / PDL</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="swingHighLow" checked />
              <span class="swatch swing-swatch"></span>
              <span class="layer-name">Swing H/L</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="trendlines" checked />
              <span class="swatch trendline-swatch"></span>
              <span class="layer-name">Trendlines</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="iofZones" checked />
              <span class="swatch iof-swatch"></span>
              <span class="layer-name">IOF Zones</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="volumeProfile" checked />
              <span class="swatch" style="background:rgba(255,255,255,0.7);border-style:dashed"></span>
              <span class="layer-name">Volume Profile</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="openingRange" checked />
              <span class="swatch" style="background:#ff9800"></span>
              <span class="layer-name">Opening Range</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="sessionLevels" checked />
              <span class="swatch" style="background:rgba(255,193,7,0.8);border-style:dashed"></span>
              <span class="layer-name">Session Levels</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="correlationHeatmap" checked />
              <span class="swatch corr-swatch"></span>
              <span class="layer-name">Correlation</span>
            </label>

          </div>

          <!-- Feature toggles (server-rendered by layers.js) -->
          <div class="panel-header features-header">Features</div>
          <div id="feature-list"></div>

          <!-- Mobile-only nav links (visible in Layers tab) -->
          <div class="mobile-links-section">
            <a href="/docs.html" class="mobile-link-btn">Setup Guide</a>
            <a href="/commentary.html" class="mobile-link-btn">AI Analysis</a>
            <a href="/performance.html" class="mobile-link-btn">Performance</a>
            <a href="/backtest.html" class="mobile-link-btn">Backtest</a>
            <a href="/api/export" class="mobile-link-btn" download>Export Data</a>
          </div>

        </div>


      </aside>
    </main>

    <!-- ── Bottom tab navigation (mobile only) ───────────────────────────── -->
    <nav id="bottom-nav" aria-label="Main navigation">

      <button class="tab-btn active" data-tab="chart" aria-label="Chart">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="7" width="3" height="9" rx="0.5" fill="currentColor"/>
          <line x1="6.5" y1="5" x2="6.5" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6.5" y1="16" x2="6.5" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="16" y="5" width="3" height="9" rx="0.5" fill="currentColor"/>
          <line x1="17.5" y1="3" x2="17.5" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="17.5" y1="14" x2="17.5" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="tab-label">Chart</span>
      </button>

      <button class="tab-btn" data-tab="alerts" aria-label="Alerts">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="tab-label">Alerts</span>
        <span class="tab-badge" id="tab-alert-badge"></span>
      </button>

      <button class="tab-btn" data-tab="layers" aria-label="Layers &amp; Settings">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <circle cx="8"  cy="6"  r="2.5" fill="currentColor" stroke="none"/>
          <line x1="4" y1="12" x2="20" y2="12"/>
          <circle cx="16" cy="12" r="2.5" fill="currentColor" stroke="none"/>
          <line x1="4" y1="18" x2="20" y2="18"/>
          <circle cx="10" cy="18" r="2.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="tab-label">Layers</span>
      </button>

    </nav>

  </div>

  <!-- chart.js first — sets up window.ChartAPI synchronously -->
  <script src="/js/chart.js"></script>
  <!-- layers.js second — reads window.ChartAPI immediately -->
  <script src="/js/layers.js"></script>
  <script src="/js/alerts.js"></script>
  <!-- PWA service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
