<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FuturesEdge AI</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <!-- TradingView Lightweight Charts v4 — loaded before our scripts -->
  <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="app">

    <header id="topbar">
      <div id="brand">FuturesEdge AI</div>
      <span id="session-badge" class="session-badge">—</span>
      <span id="data-age" class="data-age">—</span>

      <div id="controls">
        <div class="control-group">
          <span class="control-label">Symbol</span>
          <div class="btn-group">
            <button class="sym-btn active" data-symbol="MNQ">MNQ</button>
            <button class="sym-btn"        data-symbol="MGC">MGC</button>
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Timeframe</span>
          <div class="btn-group">
            <button class="tf-btn"        data-tf="1m">1m</button>
            <button class="tf-btn"        data-tf="2m">2m</button>
            <button class="tf-btn"        data-tf="3m">3m</button>
            <button class="tf-btn active" data-tf="5m">5m</button>
            <button class="tf-btn"        data-tf="15m">15m</button>
          </div>
        </div>
      </div>

      <div id="ohlc-display">
        <span class="ohlc-label">O</span><span id="ohlc-o">—</span>
        <span class="ohlc-label">H</span><span id="ohlc-h">—</span>
        <span class="ohlc-label">L</span><span id="ohlc-l">—</span>
        <span class="ohlc-label">C</span><span id="ohlc-c">—</span>
      </div>

      <div id="last-price">
        <span id="price-value">—</span>
        <span id="price-symbol">MNQ · 5m</span>
      </div>

      <a href="/commentary.html" id="ai-nav-link" title="AI Analysis">AI Analysis</a>
      <span id="ws-status" class="ws-status ws-connecting" title="WebSocket status"></span>
    </header>

    <main id="main">
      <div id="chart-wrap">
        <div id="chart-container"></div>
      </div>

      <aside id="right-panel">

        <!-- ── Layer toggles ───────────────────────────────────────────── -->
        <div class="panel-section">
          <div class="panel-header">Layers</div>
          <div id="layer-list">

            <label class="layer-row">
              <input type="checkbox" data-layer="ema9" checked />
              <span class="swatch" style="background:#2962ff"></span>
              <span class="layer-name">EMA 9</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="ema21" checked />
              <span class="swatch" style="background:#ff6d00"></span>
              <span class="layer-name">EMA 21</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="ema50" checked />
              <span class="swatch" style="background:#d500f9"></span>
              <span class="layer-name">EMA 50</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="vwap" checked />
              <span class="swatch" style="background:#00bcd4; border-style:dashed"></span>
              <span class="layer-name">VWAP</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="priorDayHighLow" checked />
              <span class="swatch" style="background:#607d8b; border-style:dashed"></span>
              <span class="layer-name">PDH / PDL</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="swingHighLow" checked />
              <span class="swatch swing-swatch"></span>
              <span class="layer-name">Swing H/L</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="trendlines" checked />
              <span class="swatch trendline-swatch"></span>
              <span class="layer-name">Trendlines</span>
            </label>

            <label class="layer-row">
              <input type="checkbox" data-layer="iofZones" checked />
              <span class="swatch iof-swatch"></span>
              <span class="layer-name">IOF Zones</span>
            </label>

          </div>
        </div>

        <!-- ── Alert feed ──────────────────────────────────────────────── -->
        <div class="panel-section" id="alert-section">

          <div class="panel-header">
            Alert Feed
            <span id="alert-stats" class="alert-stats-badge">—</span>
          </div>

          <!-- Win-rate stats row -->
          <div id="wr-bar">
            <span id="wr-won"  class="wr-won">W 0</span>
            <span id="wr-lost" class="wr-lost">L 0</span>
            <span id="wr-open" class="wr-open">O 0</span>
            <span id="wr-pct"  class="wr-pct">— WR</span>
          </div>

          <!-- Filter controls -->
          <div id="alert-filters">
            <div class="filter-row">
              <label class="filter-label" for="min-conf">Min Conf</label>
              <input id="min-conf" type="number" class="filter-input" value="0" min="0" max="99" step="5" />
              <span class="filter-unit">%</span>
            </div>
            <div class="filter-row">
              <label class="filter-label">Contracts</label>
              <span class="filter-sym">MNQ</span>
              <input id="mnq-contracts" type="number" class="filter-input narrow" value="5" min="1" max="20" />
              <span class="filter-sym">MGC</span>
              <input id="mgc-contracts" type="number" class="filter-input narrow" value="3" min="1" max="20" />
            </div>
            <div class="filter-row">
              <label class="filter-label" for="max-risk">Max Risk</label>
              <span class="filter-unit">$</span>
              <input id="max-risk" type="number" class="filter-input" value="200" min="50" max="2000" step="50" />
            </div>
            <div class="filter-row">
              <label class="filter-label" for="rr-ratio">R:R Ratio</label>
              <input id="rr-ratio" type="number" class="filter-input narrow" value="2.0" min="1.5" max="5" step="0.5" />
              <span class="filter-unit">:1</span>
              <span id="rr-status" class="filter-unit rr-status"></span>
            </div>
            <div class="filter-row">
              <label class="filter-label">Refresh</label>
              <select id="refresh-interval" class="filter-select">
                <option value="1">1 min</option>
                <option value="5">5 min</option>
                <option value="10">10 min</option>
                <option value="15" selected>15 min</option>
                <option value="30">30 min</option>
              </select>
              <button id="refresh-now-btn" class="refresh-now-btn" title="Fetch fresh data now">↻ Now</button>
            </div>
          </div>

          <div id="alert-feed">
            <p class="placeholder">Scanning…</p>
          </div>
        </div>

      </aside>
    </main>

  </div>

  <!-- chart.js first — sets up window.ChartAPI synchronously -->
  <script src="/js/chart.js"></script>
  <!-- layers.js second — reads window.ChartAPI immediately -->
  <script src="/js/layers.js"></script>
  <script src="/js/alerts.js"></script>
</body>
</html>
